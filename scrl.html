<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>PRBXX | Showcase</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;600;700&display=swap" rel="stylesheet">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/ScrollTrigger.min.js"></script>
    <style>
        :root {
            --bg-color: #f7f7f7;
            --text-dark: #1a1a1a;
            --brand-cyan: #22d3ee;
        }

        * {
            margin: 0;
            padding: 0;
            box-sizing: border-box;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-dark);
            overflow-x: hidden;
            /* Subtle noise/wave texture background */
            background-image: radial-gradient(circle at 15% 50%, rgba(255, 255, 255, 0.4) 0%, transparent 50%),
                              radial-gradient(circle at 85% 30%, rgba(255, 255, 255, 0.6) 0%, transparent 50%);
        }

        /* Navbar */
        nav {
            position: fixed;
            top: 0;
            width: 100%;
            display: flex;
            justify-content: space-between;
            align-items: center;
            padding: 20px 50px;
            z-index: 1000;
            mix-blend-mode: difference;
            color: white; /* Mix blend makes it visible on dark/light */
        }

        .logo {
            font-weight: 700;
            font-size: 1.2rem;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .nav-links {
            display: flex;
            gap: 30px;
            font-size: 0.9rem;
            font-weight: 400;
        }

        /* Main Container for Scroll */
        .scrolly-container {
            width: 100%;
            height: 400vh; /* Gives room to scroll */
            position: relative;
        }

        /* The Sticky Stage */
        .stage {
            position: sticky;
            top: 0;
            width: 100vw;
            height: 100vh;
            overflow: hidden;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Typography */
        .main-title {
            position: absolute;
            font-size: 4rem;
            font-weight: 600;
            letter-spacing: -1px;
            text-align: center;
            z-index: 5;
            width: 100%;
            top: 15%;
            color: #1a1a1a;
            will-change: transform, opacity;
        }

        .side-title {
            position: absolute;
            left: 5%;
            top: 30%;
            width: 35%;
            font-size: 3rem;
            font-weight: 600;
            line-height: 1.1;
            opacity: 0;
            z-index: 4;
        }

        .side-title span {
            color: #d63031;
        }
        
        .side-desc {
            font-size: 1rem;
            font-weight: 300;
            color: #555;
            margin-top: 20px;
            max-width: 80%;
        }

        /* Cards Layer */
        .cards-wrapper {
            position: absolute;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            width: 100vw;
            height: 100vh;
            z-index: 10;
            perspective: 1500px;
            pointer-events: none; /* Let clicks pass through empty space */
        }

        .card {
            position: absolute;
            left: 50%;
            top: 55%;
            width: 250px;
            height: 250px;
            margin-left: -125px; /* Center offset */
            margin-top: -125px;
            border-radius: 20px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 20px 40px rgba(0,0,0,0.2);
            will-change: transform;
            pointer-events: auto; /* Enable hover/clicks on cards */
            cursor: pointer;
            transition: box-shadow 0.3s ease;
        }

        .card:hover {
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            z-index: 100 !important; /* Bring hovered to front */
        }

        /* Specific card setups */
        #card-1 { background-image: url('https://images.unsplash.com/photo-1618005182384-a83a8bd57fbe?q=80&w=800'); }
        #card-2 { background-image: url('https://images.unsplash.com/photo-1605721911519-3dfeb3be25e7?q=80&w=800'); }
        #card-3 { background-image: url('https://images.unsplash.com/photo-1549490349-8643362247b5?q=80&w=800'); }
        #card-4 { background-image: url('https://images.unsplash.com/photo-1550684848-fac1c5b4e853?q=80&w=800'); }
        #card-5 { background-image: url('https://images.unsplash.com/photo-1507608616759-54f48f0af0ee?q=80&w=800'); }

        /* Hover tags */
        .author-tag {
            position: absolute;
            top: -40px;
            left: 50%;
            transform: translateX(-50%) scale(0);
            background: #2ebd59;
            color: white;
            font-size: 0.8rem;
            font-weight: 600;
            padding: 5px 15px;
            border-radius: 20px;
            opacity: 0;
            transition: all 0.3s cubic-bezier(0.175, 0.885, 0.32, 1.275);
            pointer-events: none;
        }

        /* Add little tail to tag */
        .author-tag::after {
            content: '';
            position: absolute;
            bottom: -5px;
            left: 50%;
            transform: translateX(-50%);
            border-width: 6px 6px 0;
            border-style: solid;
            border-color: #2ebd59 transparent transparent transparent;
        }

        .card:hover .author-tag {
            transform: translateX(-50%) scale(1);
            opacity: 1;
        }

        /* Specific tag colors based on your screenshot */
        #card-1 .author-tag { background: #3b82f6; border-color: #3b82f6 transparent transparent transparent; }
        #card-3 .author-tag { background: #eab308; border-color: #eab308 transparent transparent transparent; }
        #card-5 .author-tag { background: #10b981; border-color: #10b981 transparent transparent transparent; }

        /* Bottom Info info shown in screenshot 3 */
        .bottom-info {
            position: absolute;
            bottom: 50px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 20px;
            align-items: center;
            opacity: 0;
            transition: opacity 0.5s ease;
            z-index: 20;
            will-change: opacity;
        }

        .bottom-info button {
            background: #1a1a1a;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 30px;
            font-family: inherit;
            font-size: 0.9rem;
            cursor: pointer;
        }

        .bottom-info .read-more {
            background: transparent;
            color: #1a1a1a;
            font-size: 0.9rem;
            cursor: pointer;
            text-decoration: underline;
        }

        /* Modal Styles */
        .modal {
            position: fixed;
            top: 0;
            left: 0;
            width: 100vw;
            height: 100vh;
            background: rgba(255, 255, 255, 0.9);
            backdrop-filter: blur(10px);
            z-index: 2000;
            display: flex;
            justify-content: center;
            align-items: center;
            opacity: 0;
            pointer-events: none;
            transition: opacity 0.4s ease;
        }

        .modal.active {
            opacity: 1;
            pointer-events: auto;
        }

        .modal-content {
            position: relative;
            width: 500px;
            height: 500px;
            border-radius: 30px;
            background-size: cover;
            background-position: center;
            box-shadow: 0 30px 60px rgba(0,0,0,0.3);
            transform: scale(0.8);
            transition: transform 0.4s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        .modal.active .modal-content {
            transform: scale(1);
        }

        .close-btn {
            position: absolute;
            top: -20px;
            right: -20px;
            background: white;
            color: black;
            border: none;
            width: 40px;
            height: 40px;
            border-radius: 50%;
            font-size: 1.5rem;
            cursor: pointer;
            box-shadow: 0 5px 15px rgba(0,0,0,0.2);
            display: flex;
            justify-content: center;
            align-items: center;
        }
    </style>
</head>
<body>

    <nav>
        <div class="logo">
            <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="12 2 2 7 12 12 22 7 12 2"></polygon><polyline points="2 17 12 22 22 17"></polyline><polyline points="2 12 12 17 22 12"></polyline></svg>
            Prbxx
        </div>
        <div class="nav-links">
            <span style="color:#1a1a1a; cursor:pointer;">Get Started</span>
            <span style="color:#1a1a1a; cursor:pointer;">&#9658; Create strategy</span>
            <span style="color:#1a1a1a; cursor:pointer;">Pricing</span>
            <span style="color:#1a1a1a; cursor:pointer;">Contact</span>
        </div>
    </nav>

    <div class="scrolly-container">
        <div class="stage">
            
            <div class="main-title" id="title-1">
                A place to display your <br> masterpiece.
            </div>

            <div class="side-title" id="title-2">
                Showcase, Sell, <br>
                <span>& acquire arts</span> <br>
                our 
                <p class="side-desc">Dynamic community where artists and buyers connect directly without middleman.</p>
            </div>

            <!-- Global Action Info at bottom center (shown in arc phase) -->
            <div class="bottom-info" id="global-actions">
                <button>Join for $9.99/m</button>
                <div class="read-more">Read more</div>
            </div>

            <div class="cards-wrapper">
                <div class="card" id="card-1"><div class="author-tag">@coplin</div></div>
                <div class="card" id="card-2"><div class="author-tag">@studio</div></div>
                <div class="card" id="card-3"><div class="author-tag">@bosch</div></div>
                <div class="card" id="card-4"><div class="author-tag">@redart</div></div>
                <div class="card" id="card-5"><div class="author-tag">@andrea</div></div>
            </div>

        </div>
    </div>

    <!-- Modal for Popups -->
    <div class="modal" id="image-modal">
        <div class="modal-content" id="modal-img">
            <button class="close-btn" id="close-modal">&times;</button>
        </div>
    </div>

    <script>
        gsap.registerPlugin(ScrollTrigger);

        // --- Initial Setups ---
        // Hide cards at bottom before scroll starts
        gsap.set('.card', { y: 800, scale: 0.5, opacity: 0 });
        gsap.set('#title-1', { opacity: 0, y: 50 });
        
        // --- The Timeline ---
        // Setting up scrub timeline covering 3 layers of scroll mapping
        const tl = gsap.timeline({
            scrollTrigger: {
                trigger: ".scrolly-container",
                start: "top top",
                end: "bottom bottom",
                scrub: 1.5 // smooth dragging parameter
            }
        });

        // SEQUENCE 1: Hero Entry
        // Title fades in, Green portrait (card-5) comes from bottom
        tl.to('#title-1', { opacity: 1, y: 0, duration: 2 })
          .to('#card-3', { y: 0, scale: 1, opacity: 1, duration: 4, ease: "power2.out" }, "<"); // Use card-3 as initial center

        // SEQUENCE 2: The Arc Spread
        // Other cards emerge and spread into the fan shape. Bottom info appears.
        tl.add("arc")
          .to('#card-1', { x: -350, y: 60, rotation: -12, scale: 0.9, opacity: 1, duration: 4 }, "arc")
          .to('#card-2', { x: -175, y: 20, rotation: -6, scale: 0.95, opacity: 1, duration: 4 }, "arc")
          .to('#card-4', { x: 175, y: 20, rotation: 6, scale: 0.95, opacity: 1, duration: 4 }, "arc")
          .to('#card-5', { x: 350, y: 60, rotation: 12, scale: 0.9, opacity: 1, duration: 4 }, "arc")
          .to('#card-3', { x: 0, y: -20, rotation: 0, scale: 1, duration: 4 }, "arc") // shift center up slightly relative to others
          .to('#global-actions', { opacity: 1, duration: 2 }, "arc+=2"); // actions fade in middle of arc spread
        
        // Pause to hold the arc shape while scrolling slightly
        tl.to({}, {duration: 2}); 

        // SEQUENCE 3: The Diagonal Cascade
        // Center text fades out, left text comes in. Cards stack diagonally.
        tl.add("diagonal")
          .to('#title-1', { opacity: 0, y: -50, duration: 2 }, "diagonal")
          .to('#global-actions', { opacity: 0, duration: 2 }, "diagonal")
          .to('#title-2', { opacity: 1, x: 50, duration: 3, ease: "power2.out" }, "diagonal")
          
          // Cascading layout logic. Top left to bottom right stack
          .to('#card-1', { x: 100, y: 150, zIndex: 1, rotation: 0, scale: 0.8, duration: 4, ease: "sine.inOut" }, "diagonal")
          .to('#card-2', { x: 150, y: 180, zIndex: 2, rotation: 0, scale: 0.85, duration: 4, ease: "sine.inOut" }, "diagonal")
          .to('#card-3', { x: 200, y: 210, zIndex: 3, rotation: 0, scale: 0.9, duration: 4, ease: "sine.inOut" }, "diagonal")
          .to('#card-4', { x: 250, y: 240, zIndex: 4, rotation: 0, scale: 0.95, duration: 4, ease: "sine.inOut" }, "diagonal")
          .to('#card-5', { x: 300, y: 270, zIndex: 5, rotation: 0, scale: 1, duration: 4, ease: "sine.inOut" }, "diagonal");

        // --- Interaction Logic (Hover effect is in CSS) ---

        // Modal Click Logic
        const modal = document.getElementById('image-modal');
        const modalContent = document.getElementById('modal-img');
        const closeBtn = document.getElementById('close-modal');
        const cards = document.querySelectorAll('.card');

        cards.forEach(card => {
            // GSAP handles card hover effects cleanly, but we can augment clicks
            card.addEventListener('click', () => {
                // Get the background image of the clicked card
                const bg = window.getComputedStyle(card).backgroundImage;
                modalContent.style.backgroundImage = bg;
                modal.classList.add('active');
            });

            // Smooth 3D tilt effect on hover to make it premium
            card.addEventListener('mousemove', (e) => {
                const rect = card.getBoundingClientRect();
                const x = e.clientX - rect.left;
                const y = e.clientY - rect.top;
                
                // Calculate rotation based on cursor
                const xRotation = -15 * ((y - rect.height / 2) / (rect.height / 2));
                const yRotation = 15 * ((x - rect.width / 2) / (rect.width / 2));
                
                // Only apply tilt if the scroll animation is relatively inactive or we are hovering
                gsap.to(card, {
                    rotationX: xRotation,
                    rotationY: yRotation,
                    scale: 1.05,
                    duration: 0.3,
                    ease: 'power2.out'
                });
            });

            card.addEventListener('mouseleave', () => {
                // Reset tilt
                gsap.to(card, {
                    rotationX: 0,
                    rotationY: 0,
                    scale: card.id === 'card-3' && tl.progress() < 0.3 ? 1 : 
                           card.id === 'card-5' && tl.progress() > 0.8 ? 1 : 0.9, // Try to restore generic scale based on timeline approximation
                    duration: 0.5,
                    ease: 'power2.out'
                });
            });
        });

        closeBtn.addEventListener('click', () => {
            modal.classList.remove('active');
        });

        modal.addEventListener('click', (e) => {
            if (e.target === modal) {
                modal.classList.remove('active');
            }
        });

    </script>
</body>
</html>
